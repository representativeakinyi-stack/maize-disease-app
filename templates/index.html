<!DOCTYPE html>
<html>
<head>
    <title>Maize Disease Detection</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            margin-top: 60px;
        }

        .box {
            background: white;
            width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        button {
            background: green;
            color: white;
            padding: 10px 20px;
            border: none;
            margin-top: 10px;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            color: blue;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Upload Maize Leaf Image</h2>

    <form action="/predict" method="post" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br>
        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <div class="result">
            Prediction: <b>{{ prediction }}</b>
        </div>
    {% endif %}

</div>

</body>
</html>
