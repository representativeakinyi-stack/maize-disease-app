<!DOCTYPE html>
<html>
<head>
    <title>Maize Disease Detection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin-top: 60px;
        }

        .box {
            background: white;
            width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            color: green;
        }

        input[type="file"] {
            margin: 15px 0;
        }

        button {
            background-color: green;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: darkgreen;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            color: blue;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Upload Maize Leaf Image</h2>

    <!-- IMPORTANT: POST + file name must match Flask -->
   <form action="/predict" method="POST" enctype="multipart/form-data">
    <input type="file" name="file" required>
    <button type="submit">Predict</button>
</form>

        <input type="file" name="file" required>
        <br>

        <button type="submit">Predict</button>

    </form>

    <!-- Prediction output -->
    {% if prediction %}
        <div class="result">
            Prediction: <b>{{ prediction }}</b>
        </div>
    {% endif %}

</div>

</body>
</html>
