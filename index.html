<!DOCTYPE html>
<html>
<head>
    <title>Maize Disease Detection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin-top: 60px;
        }

        .box {
            background: white;
            width: 420px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            color: green;
        }

        input[type="file"] {
            margin: 15px 0;
        }

        button {
            background-color: green;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: darkgreen;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            color: blue;
        }

        .confidence {
            margin-top: 10px;
            font-size: 16px;
            color: black;
        }

        img {
            margin-top: 15px;
            width: 250px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Maize Disease Detection</h2>

    <form action="/predict" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br>
        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
    <h2>Prediction: {{ prediction }}</h2>
    <h3>Confidence: {{ confidence }}%</h3>
    <img src="{{ image }}" width="300">
{% endif %}

</div>

</body>
</html>
